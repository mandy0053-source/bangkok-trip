// ══ 分享碼（支援中文 Unicode）══
function makeShareCode(data){
  try{return btoa(unescape(encodeURIComponent(JSON.stringify(data))));}
  catch{return "";}
}
function parseShareCode(code){
  try{
    const data=JSON.parse(decodeURIComponent(escape(atob(code.trim()))));
    return(data.items&&Array.isArray(data.items))?data:null;
  }catch{return null;}
}

// ══ 班機提醒判斷 ══
function shouldShowFlightReminder(){
  try{
    const tw=new Date(new Date().toLocaleString("en-US",{timeZone:"Asia/Taipei"}));
    const twDate=tw.toISOString().split("T")[0];
    if(twDate!==FLIGHT_DATE)return false;
    const[dh,dm]=FLIGHT_DEPART_TPE.split(":").map(Number);
    const diff=(dh*60+dm)-(tw.getHours()*60+tw.getMinutes());
    return diff>=0&&diff<=240;
  }catch{return false;}
}

// ══ 時間工具 ══
function getBangkokNow(){try{return new Date(new Date().toLocaleString("en-US",{timeZone:"Asia/Bangkok"}));}catch{return new Date();}}
function getBangkokDateStr(){try{return new Date().toLocaleDateString("en-CA",{timeZone:"Asia/Bangkok"});}catch{return new Date().toISOString().split("T")[0];}}
function getBangkokTimeStr(){const n=getBangkokNow();return String(n.getHours()).padStart(2,"0")+":"+String(n.getMinutes()).padStart(2,"0");}
function timeToMin(t){if(!t)return null;const p=t.split(":");return parseInt(p[0])*60+parseInt(p[1]);}
function getOpenStatus(item){
  if(!item.openTime&&!item.closeTime)return"unknown";
  if(item.closedWeekdays){const d=getBangkokNow().getDay();if(d!==0&&d!==6)return"closed_today";}
  const cur=timeToMin(getBangkokTimeStr()),open=timeToMin(item.openTime),close=timeToMin(item.closeTime);
  if(cur===null)return"unknown";
  return(cur>=open&&cur<(close===0?1440:close))?"open":"closed";
}
function mapsUrl(a){return"https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(a);}
function dirUrl(a,m){return"https://www.google.com/maps/dir/?api=1&destination="+encodeURIComponent(a)+"&travelmode="+m;}

// ══ 多裝置同步 Modal ══
function SyncModal({items,memo,onImport,onClose}){
  const[mode,setMode]=useState("export");
  const[importTxt,setImportTxt]=useState("");
  const[err,setErr]=useState("");
  const[copied,setCopied]=useState(false);
  const codeStr=makeShareCode({items,memo,ver:1});
  const doCopy=()=>{
    const copy=(t)=>{try{navigator.clipboard.writeText(t);}catch{const el=document.createElement("textarea");el.value=t;document.body.appendChild(el);el.select();document.execCommand("copy");document.body.removeChild(el);}};
    copy(codeStr);setCopied(true);setTimeout(()=>setCopied(false),2200);
  };
  const doImport=()=>{
    const data=parseShareCode(importTxt);
    if(!data){setErr("分享碼格式不正確，請重新確認");return;}
    onImport(data);onClose();
  };
  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
          <div style={{fontSize:17,fontWeight:800,color:HK.primary}}>🔄 多裝置同步 🎀</div>
          <button onClick={onClose} style={{background:HK.ultraLight,border:"none",borderRadius:8,width:28,height:28,cursor:"pointer",fontSize:16,color:HK.primary}}>✕</button>
        </div>
        <div style={{display:"flex",gap:8,marginBottom:14}}>
          {[["export","📤 匯出"],["import","📥 匯入"]].map(([m,l])=>(
            <button key={m} onClick={()=>{setMode(m);setErr("");}} style={{flex:1,padding:"9px",borderRadius:12,border:mode===m?"none":"1.5px solid #FFB7D1",fontSize:13,fontWeight:700,cursor:"pointer",background:mode===m?HK.grad:"white",color:mode===m?"white":HK.primary}}>{l}</button>
          ))}
        </div>
        {mode==="export"?(
          <div>
            <div style={{fontSize:12,color:HK.textMid,marginBottom:8}}>複製下方分享碼，在另一台手機選「📥 匯入」貼上即可：</div>
            <div style={{background:"#FFF0F5",border:"1.5px solid #FFB7D1",borderRadius:12,padding:"10px 12px",fontSize:11,color:HK.text,wordBreak:"break-all",maxHeight:72,overflowY:"auto",marginBottom:10,fontFamily:"monospace",lineHeight:1.5}}>{codeStr.substring(0,120)}…</div>
            <button onClick={doCopy} style={{width:"100%",background:copied?"#22C55E":HK.grad,color:"white",border:"none",borderRadius:14,padding:"12px",fontSize:14,fontWeight:800,cursor:"pointer",transition:"background 0.3s"}}>
              {copied?"✅ 已複製成功！":"📋 複製分享碼"}
            </button>
            <div style={{fontSize:11,color:HK.textLight,textAlign:"center",marginTop:8}}>可透過 LINE / WhatsApp 傳給同行的手機</div>
          </div>
        ):(
          <div>
            <div style={{fontSize:12,color:HK.textMid,marginBottom:8}}>貼上從其他手機複製的分享碼：</div>
            <textarea style={{...S.inp,height:90,resize:"none",fontFamily:"monospace",fontSize:12}} value={importTxt} onChange={e=>{setImportTxt(e.target.value);setErr("");}} placeholder="在此貼上分享碼…"/>
            {err&&<div style={{fontSize:12,color:"#ef4444",marginTop:4}}>⚠️ {err}</div>}
            <button onClick={doImport} style={{width:"100%",background:HK.grad,color:"white",border:"none",borderRadius:14,padding:"12px",fontSize:14,fontWeight:800,cursor:"pointer",marginTop:10}}>
              📥 匯入並覆蓋本機資料
            </button>
            <div style={{fontSize:11,color:HK.textLight,textAlign:"center",marginTop:8}}>⚠️ 匯入後將覆蓋本機現有行程</div>

// ══ 天氣元件 ══
function WeatherWidget({currentDate}){
  const[wdata,setWdata]=useState(null);
  const[loading,setLoading]=useState(true);
  const[err,setErr]=useState(false);
  const[updated,setUpdated]=useState(null);
  const load=()=>{
    setLoading(true);
    window.fetch("https://api.open-meteo.com/v1/forecast?latitude=13.7563&longitude=100.5018&hourly=temperature_2m,precipitation_probability,weathercode,windspeed_10m&timezone=Asia/Bangkok&forecast_days=2")
      .then(r=>r.json()).then(d=>{setWdata(d);setUpdated(getBangkokTimeStr());setLoading(false);setErr(false);})
      .catch(()=>{setErr(true);setLoading(false);});
  };
  useEffect(()=>{load();},[]);
  useEffect(()=>{const id=setInterval(load,30*60*1000);return()=>clearInterval(id);},[]);
  const slots=useMemo(()=>{
    if(!wdata)return[];
    const h=getBangkokNow().getHours();
    const target=currentDate+"T"+String(h).padStart(2,"0")+":00";
    let idx=wdata.hourly.time.findIndex(t=>t===target);
    if(idx<0)idx=0;
    return Array.from({length:6},(_,i)=>{
      const j=idx+i;if(j>=wdata.hourly.time.length)return null;
      const t=wdata.hourly.time[j],hr=parseInt(t.split("T")[1]),code=wdata.hourly.weathercode[j],w=wmo(code);
      return{label:i===0?"現在":String(hr).padStart(2,"0")+":00",temp:Math.round(wdata.hourly.temperature_2m[j]),rain:wdata.hourly.precipitation_probability[j],wind:Math.round(wdata.hourly.windspeed_10m[j]),icon:w.icon,desc:w.desc,isNow:i===0};
    }).filter(Boolean);
  },[wdata,currentDate]);
  const cur=slots[0];
  return(
    <div style={{background:"linear-gradient(135deg,#FFF0F5,#FFE4ED)",border:"1.5px solid #FFB7D1",borderRadius:20,padding:"14px 16px 12px",marginBottom:10}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <span style={{fontSize:15,fontWeight:700,color:HK.primary}}>🌤️ 曼谷即時天氣</span>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {updated&&<span style={{fontSize:11,color:HK.light}}>更新 {updated}</span>}
          <button onClick={load} style={{background:"#FFB7D1",border:"none",borderRadius:10,padding:"3px 10px",fontSize:12,color:HK.primary,cursor:"pointer",fontWeight:600}}>↻</button>
        </div>
      </div>
      {loading&&<div style={{textAlign:"center",padding:"12px 0",color:HK.light,fontSize:14}}>⏳ 取得曼谷天氣中…</div>}
      {err&&<div style={{textAlign:"center",padding:"8px",color:"#f87171",fontSize:13,background:"#fef2f2",borderRadius:12}}>⚠️ 天氣暫時無法取得，請確認網路後重試</div>}
      {!loading&&!err&&cur&&(
        <div>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10,background:"white",borderRadius:16,padding:"10px 14px"}}>
            <span style={{fontSize:38}}>{cur.icon}</span>
            <div style={{flex:1}}><div style={{fontSize:28,fontWeight:800,color:HK.primary,lineHeight:1}}>{cur.temp}°C</div><div style={{fontSize:13,color:HK.textMid,marginTop:2}}>{cur.desc}</div></div>
            <div style={{textAlign:"right",fontSize:12,color:HK.textMid,lineHeight:1.9}}>
              <div>💧 降雨 {cur.rain}%</div><div>💨 {cur.wind} km/h</div>
              {cur.rain>=60&&<div style={{color:"#f97316",fontWeight:700}}>☂️ 建議帶傘</div>}
              {cur.temp>=35&&<div style={{color:"#ef4444",fontWeight:700}}>🔥 高溫防曬</div>}
            </div>
          </div>
          <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:4}}>
            {slots.map((h,i)=>(
              <div key={i} style={{flex:"0 0 auto",minWidth:64,textAlign:"center",background:h.isNow?HK.grad:"white",borderRadius:14,padding:"8px 6px",border:h.isNow?"none":"1.5px solid #FFB7D1"}}>
                <div style={{fontSize:11,fontWeight:700,color:h.isNow?"white":HK.light,marginBottom:3}}>{h.label}</div>
                <div style={{fontSize:22,marginBottom:2}}>{h.icon}</div>
                <div style={{fontSize:14,fontWeight:800,color:h.isNow?"white":HK.primary}}>{h.temp}°</div>
                <div style={{fontSize:10,color:h.isNow?"#FFE8F0":HK.light,marginTop:2}}>💧{h.rain}%</div>
                {h.rain>=60&&<div style={{fontSize:10,marginTop:1}}>☂️</div>}
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ══ 主元件 ══
function BangkokPlanner(){
  const[items,setItems]=useState(()=>LS.get("bkk_items",INITIAL_ITEMS));
  const[tab,setTab]=useState("itinerary");
  const[filter,setFilter]=useState("all");
  const[search,setSearch]=useState("");
  const[showForm,setShowForm]=useState(false);
  const[editingItem,setEditingItem]=useState(null);
  const[sortBy,setSortBy]=useState("date");
  const[currentTime,setCurrentTime]=useState(getBangkokTimeStr);
  const[currentDate,setCurrentDate]=useState(getBangkokDateStr);
  const[showFlightReminder,setShowFlightReminder]=useState(()=>shouldShowFlightReminder());
  const[showSync,setShowSync]=useState(false);
  const[dismissedReminder,setDismissedReminder]=useState(false);

  // ── 自動儲存到 localStorage ──
  useEffect(()=>{LS.set("bkk_items",items);LS.set("bkk_nextId",nextId);},[items]);
  useEffect(()=>{const id=setInterval(()=>{setCurrentTime(getBangkokTimeStr());setCurrentDate(getBangkokDateStr());},30000);return()=>clearInterval(id);},[]);

  const todayFestivals=useMemo(()=>THAI_FESTIVALS.filter(f=>f.date===currentDate),[currentDate]);
  const hasAlcohol=todayFestivals.some(f=>f.alcoholRestriction);

  const handleSave=(form)=>{
    if(editingItem){setItems(prev=>prev.map(it=>it.id===editingItem.id?{...form,id:it.id}:it));setEditingItem(null);}
    else{setItems(prev=>[...prev,{...form,id:nextId++}]);setShowForm(false);}
  };
  const filtered=useMemo(()=>{
    let r=items;
    if(filter!=="all")r=r.filter(it=>it.category===filter);
    if(search.trim()){const q=search.toLowerCase();r=r.filter(it=>it.name.toLowerCase().includes(q)||(it.address||"").toLowerCase().includes(q)||(it.notes||"").toLowerCase().includes(q));}
    if(sortBy==="date")r=[...r].sort((a,b)=>((a.date||"9999")+(a.time||"")).localeCompare((b.date||"9999")+(b.time||"")));
    else if(sortBy==="category")r=[...r].sort((a,b)=>a.category.localeCompare(b.category));
    else if(sortBy==="name")r=[...r].sort((a,b)=>a.name.localeCompare(b.name,"zh-TW"));
    return r;
  },[items,filter,search,sortBy]);
  const grouped=useMemo(()=>{
    const g={};filtered.forEach(it=>{const k=it.date||"未指定日期";if(!g[k])g[k]=[];g[k].push(it);});
    return Object.entries(g).sort(([a],[b])=>a.localeCompare(b));
  },[filtered]);
  const counts=useMemo(()=>{const c={all:items.length};Object.keys(CATEGORIES).forEach(k=>{c[k]=items.filter(it=>it.category===k).length;});return c;},[items]);

  const handleImport=(data)=>{
    setItems(data.items);
    nextId=Math.max(...data.items.map(it=>it.id),0)+1;
    LS.set("bkk_items",data.items);
    LS.set("bkk_nextId",nextId);
    if(data.memo!==undefined)LS.set("bkk_memo",data.memo);
  };

  const TABS=[{id:"itinerary",icon:"🗺️",label:"行程"},{id:"flight",icon:"✈️",label:"航班住宿"},{id:"emergency",icon:"🚨",label:"緊急資訊"},{id:"tips",icon:"⚠️",label:"注意事項"}];

  return(
    <div style={{minHeight:"100vh",background:"transparent",paddingBottom:80}}>
      {/* 班機提醒 Modal */}
      {showFlightReminder&&!dismissedReminder&&(
        <FlightReminderModal onClose={()=>{setShowFlightReminder(false);setDismissedReminder(true);}}/>
      )}
      {/* 同步 Modal */}
      {showSync&&(
        <SyncModal items={items} memo={LS.get("bkk_memo","")} onImport={handleImport} onClose={()=>setShowSync(false)}/>
      )}

      {/* Header */}
      <div style={{position:"sticky",top:0,zIndex:50,background:HK.grad,padding:"14px 16px 10px",boxShadow:"0 4px 24px rgba(255,79,130,0.3)"}}>
        <div style={{maxWidth:480,margin:"0 auto"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
            <div>
              <div style={{fontSize:20,fontWeight:900,color:"white",letterSpacing:0.5}}>🎀 曼谷旅遊規劃 🎀</div>
              <div style={{fontSize:11,color:"#FFE8F0",marginTop:1}}>曼谷時間 {currentTime}・{currentDate}{hasAlcohol&&<span style={{marginLeft:8,background:"rgba(255,255,255,0.22)",borderRadius:20,padding:"1px 8px",fontWeight:700}}>🚫 今日禁酒</span>}</div>
            </div>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              <button onClick={()=>setShowSync(true)} style={{background:"rgba(255,255,255,0.22)",border:"none",borderRadius:14,padding:"6px 10px",fontSize:12,fontWeight:700,color:"white",cursor:"pointer"}}>🔄 同步</button>
              {tab==="itinerary"&&<button onClick={()=>{setShowForm(true);setEditingItem(null);}} style={{background:"white",border:"none",borderRadius:20,padding:"8px 16px",fontSize:13,fontWeight:900,color:HK.primary,cursor:"pointer"}}>＋ 新增</button>}
            </div>
          </div>
          {tab==="itinerary"&&(
            <div style={{marginTop:6}}>
              <input style={{width:"100%",padding:"8px 14px",borderRadius:20,border:"none",fontSize:13,background:"rgba(255,255,255,0.22)",color:"white",outline:"none",boxSizing:"border-box",marginBottom:7}} placeholder="🔍 搜尋景點、美食、交通…" value={search} onChange={e=>setSearch(e.target.value)}/>
              <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:2}}>
                {[["all","全部",null],...Object.entries(CATEGORIES).map(([k,v])=>[k,v.label,v.icon])].map(([k,label,icon])=>(
                  <button key={k} onClick={()=>setFilter(k)} style={{flexShrink:0,padding:"4px 12px",borderRadius:20,border:"none",fontSize:12,fontWeight:700,cursor:"pointer",background:filter===k?"white":"rgba(255,255,255,0.22)",color:filter===k?HK.primary:"white"}}>
                    {icon?icon+" ":""}{label} ({counts[k]||0})
                  </button>
                ))}
              </div>
            </div>
          )}
        </div>
      </div>

      {/* Content */}
      <div style={{maxWidth:480,margin:"0 auto",padding:"14px 14px 0"}}>
        {tab==="itinerary"&&(
          <div>
            <WeatherWidget currentDate={currentDate}/>
            <MapSection/>
            <MemoWidget/>
            <HolidayBanner todayFestivals={todayFestivals}/>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10}}>
              <span style={{fontSize:12,color:HK.light}}>排序：</span>
              {[["date","📅 日期"],["category","🏷️ 類別"],["name","🔤 名稱"]].map(([k,l])=>(
                <button key={k} onClick={()=>setSortBy(k)} style={{padding:"4px 10px",borderRadius:10,border:sortBy===k?"none":"1.5px solid #FFB7D1",fontSize:11,fontWeight:700,cursor:"pointer",background:sortBy===k?HK.primary:"white",color:sortBy===k?"white":HK.textMid}}>{l}</button>
              ))}
              <span style={{marginLeft:"auto",fontSize:11,color:HK.light}}>{filtered.length} 項</span>
            </div>
            {showForm&&!editingItem&&(<div style={{background:"white",borderRadius:20,padding:16,boxShadow:"0 4px 24px rgba(255,79,130,0.15)",border:"1.5px solid #FFB7D1",marginBottom:12}}><div style={{fontSize:16,fontWeight:800,color:HK.primary,marginBottom:14}}>🎀 新增行程</div><ItemForm onSave={handleSave} onCancel={()=>setShowForm(false)}/></div>)}
            {editingItem&&(<div style={{background:"white",borderRadius:20,padding:16,boxShadow:"0 4px 24px rgba(255,79,130,0.15)",border:"1.5px solid #FFB7D1",marginBottom:12}}><div style={{fontSize:16,fontWeight:800,color:HK.primary,marginBottom:14}}>✏️ 編輯行程</div><ItemForm initial={editingItem} onSave={handleSave} onCancel={()=>setEditingItem(null)}/></div>)}
            {grouped.length===0?(
              <div style={{textAlign:"center",padding:"40px 20px",color:HK.light}}><div style={{fontSize:48,marginBottom:12}}>🎀</div><div>尚無行程，點右上角「新增」開始規劃吧！</div></div>
            ):grouped.map(([date,dayItems])=>{
              const dayFests=THAI_FESTIVALS.filter(f=>f.date===date);
              return(
                <div key={date} style={{marginBottom:16}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                    <span style={{fontSize:12,fontWeight:700,color:HK.textMid}}>
                      {date==="未指定日期"?"📋 未指定日期":"📅 "+date}
                      {dayFests.map(f=><span key={f.name} style={{marginLeft:6,fontSize:14}} title={f.name}>{f.icon}</span>)}
                    </span>
                    <div style={{flex:1,height:1,background:"#FFB7D1"}}/>
                    <span style={{fontSize:11,color:HK.light}}>{dayItems.length} 項</span>
                  </div>
                  {dayItems.map(item=><ItemCard key={item.id} item={item} onEdit={it=>{setEditingItem(it);setShowForm(false);}} onDelete={id=>{setItems(prev=>prev.filter(it=>it.id!==id));if(editingItem&&editingItem.id===id)setEditingItem(null);}} todayFestivals={date===currentDate?todayFestivals:dayFests}/>)}
                </div>
              );
            })}
          </div>
        )}
        {tab==="flight"&&<FlightHotelTab/>}
        {tab==="emergency"&&<EmergencyTab/>}
        {tab==="tips"&&<TravelTipsTab/>}
      </div>

      {/* Bottom Tab Bar */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:50,background:"white",borderTop:"2px solid #FFD6E7",boxShadow:"0 -4px 20px rgba(255,79,130,0.12)"}}>
        <div style={{maxWidth:480,margin:"0 auto",display:"flex"}}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"10px 4px 8px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
              <span style={{fontSize:20}}>{t.icon}</span>
              <span style={{fontSize:10,fontWeight:700,color:tab===t.id?HK.primary:"#FFB7D1"}}>{t.label}</span>
              {tab===t.id&&<div style={{width:22,height:3,borderRadius:3,background:HK.primary,marginTop:1}}/>}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<BangkokPlanner />);
</script>
</body>
</html>
